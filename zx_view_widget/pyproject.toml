[tool.ruff]
target-version = "py313"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "SIM", # flake8-simplify
    "RUF", # ruff-specific rules
]
ignore = [
    "E501",   # line too long
    "SIM108", # ternary operator
]

[tool.ty.rules]
# pyzx/matplotlib/numpy aren't installed in the lint environment
unresolved-import = "ignore"
